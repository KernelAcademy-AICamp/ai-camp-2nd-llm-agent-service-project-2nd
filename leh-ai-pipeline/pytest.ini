[pytest]
# Pytest configuration for LEH AI Pipeline

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=src
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=80

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    real: Real API tests (requires API keys)

# Coverage
[coverage:run]
source = src
omit =
    */tests/*
    */__init__.py
    # AWS service files (not testable locally)
    */dynamodb_store.py
    */opensearch_store.py

[coverage:report]
precision = 2
show_missing = True
