[pytest]
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto

addopts =
    -v
    --strict-markers
    --tb=short
    --color=yes
    --failed-first
    -x

markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (may use real services)
    e2e: End-to-end tests (full system tests)
    slow: Slow tests
    red: RED phase - failing tests
    green: GREEN phase - passing tests
    refactor: REFACTOR phase - optimized tests