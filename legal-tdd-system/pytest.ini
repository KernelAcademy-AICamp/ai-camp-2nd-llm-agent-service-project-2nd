[pytest]
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto

addopts =
    -v
    --strict-markers
    --tb=short
    --cov=src
    --cov-report=term-missing
    --cov-report=html
    --cov-fail-under=80
    --color=yes
    --failed-first
    -x

markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (may use real services)
    e2e: End-to-end tests (full system tests)
    slow: Slow tests
    red: RED phase - failing tests
    green: GREEN phase - passing tests
    refactor: REFACTOR phase - optimized tests

[coverage:run]
source = src
omit =
    */tests/*
    */__init__.py
    */test_*.py

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.: