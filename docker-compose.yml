version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: leh-postgres
    restart: always
    environment:
      POSTGRES_USER: leh_user
      POSTGRES_PASSWORD: leh_password
      POSTGRES_DB: leh_db
    ports:
      - "5434:5432"  # 5432가 사용 중인 경우 5434 사용
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leh_user -d leh_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: leh-backend
    restart: always
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+psycopg2://leh_user:leh_password@postgres:5432/leh_db
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  ai_worker:
    build: ./ai_worker
    container_name: leh-ai-worker
    restart: always
    depends_on:
      - backend
    env_file:
      - .env
    environment:
      WORKER_ENV: prod

volumes:
  postgres_data:
